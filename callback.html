<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KitUp — TikTok OAuth Callback</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.25rem;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 { font-size: 1.5rem; }
    .box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
      word-break: break-all;
    }
    code {
      display: block;
      background: #f0f0f0;
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .error { color: #b00020; }
    .ok { color: #1e5a94; }
  </style>
</head>
<body>
  <h1>TikTok OAuth Callback</h1>
  <p id="status">Reading authorization response...</p>
  <div id="code-box" class="box" style="display:none;">
    <strong>Authorization code</strong>
    <code id="auth-code"></code>
    <p class="ok">Copy this code and paste it into <code>python scripts/tiktok_oauth.py</code> on your computer.</p>
  </div>
  <div id="error-box" class="box error" style="display:none;">
    <strong>Error</strong>
    <code id="error-text"></code>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const error = params.get("error");
    const status = document.getElementById("status");

    if (error) {
      status.textContent = "Authorization failed.";
      document.getElementById("error-box").style.display = "block";
      document.getElementById("error-text").textContent =
        error + (params.get("error_description") ? ": " + params.get("error_description") : "");
    } else if (code) {
      status.textContent = "Authorization successful.";
      document.getElementById("code-box").style.display = "block";
      document.getElementById("auth-code").textContent = code;
    } else {
      status.textContent = "No authorization code found in URL.";
    }
  </script>
</body>
</html>
